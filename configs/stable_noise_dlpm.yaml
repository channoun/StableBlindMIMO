# DLPM-PVD with heavier-tailed noise (alpha=1.5) for ablation study.
# Inherits the Rayleigh channel setup but uses more impulsive noise.

# Include base config by convention; manually merge in eval.py if needed.
# base: configs/rayleigh_dlpm.yaml

channel:
  type: rayleigh
  Nr: 4
  Nt: 1
  K: 192
  Nu: 1
  T: 24

noise:
  alpha: 1.5      # More impulsive than the 1.8 baseline
  sigma_n: 1.0
  L_A: 30         # More samples needed for heavier tails

dlpm_H:
  alpha: 1.5      # Channel prior matched to noise tail
  diffusion_steps: 1000
  isotropic: true
  scale: scale_preserving
  clamp_a: 30.0   # Looser clamp for heavier tails
  clamp_eps: 100.0

dlpm_D:
  alpha: 1.8      # Image prior can stay at 1.8
  diffusion_steps: 1000
  isotropic: true
  scale: scale_preserving
  clamp_a: 10.0
  clamp_eps: 50.0

channel_net:
  hidden_dim: 256
  depth: 4
  time_embed_dim: 128

image_net:
  model_channels: 128
  channel_mult: [1, 2, 2, 2]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  num_heads: 4
  dropout: 0.0

channel_training:
  batch_size: 256
  n_iters: 100000
  lr: 0.0002
  warmup: 1000
  save_every: 10000
  checkpoint_dir: checkpoints/channel_alpha15
  device: cuda
  log_every: 500

image_training:
  data_root: data/ffhq256
  batch_size: 8
  n_iters: 500000
  lr: 0.0002
  warmup: 5000
  save_every: 50000
  checkpoint_dir: checkpoints/image
  device: cuda
  num_workers: 4
  ema_rate: 0.9999

encoder:
  embed_dim: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 8
  power: 1.0
  checkpoint: checkpoints/encoder/swin_jscc_best.pt

pvd:
  J: 1000
  lambda_H: 1.0
  lambda_D: 1.0
  L_A: 30
  use_checkpoint: true

eval:
  snr_range: [-5, 0, 5, 10, 15, 20]
  n_trials: 300
  batch_size: 4
  device: cuda
  metrics: [ms_ssim, nmse]
  channel_ckpt: checkpoints/channel_alpha15/channel_dlpm_best.pt
  image_ckpt: checkpoints/image/image_dlpm_best.pt
